services:
  - type: web
    name: portfolio-backend
    env: node
    plan: free # Change to starter if you need more resources
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false # Set via Render Dashboard
      - key: JWT_SECRET
        sync: false # Set via Render Dashboard
      - key: CLOUDINARY_CLOUD_NAME
        sync: false # Set via Render Dashboard
      - key: CLOUDINARY_API_KEY
        sync: false # Set via Render Dashboard
      - key: CLOUDINARY_API_SECRET
        sync: false # Set via Render Dashboard
      - key: ADMIN_EMAIL
        sync: false # Set via Render Dashboard
      - key: EMAIL_USER
        sync: false # Set via Render Dashboard
      - key: EMAIL_PASS
        sync: false # Set via Render Dashboard
      - key: KEEP_ALIVE_ENABLED
        value: true
      - key: KEEP_ALIVE_BACKEND_URL
        sync: false # Set to the Render URL once deployed
      - key: KEEP_ALIVE_FRONTEND_URL
        sync: false # Set to the Vercel URL
